known_limitation: >
  Materialization (agents/reasoning_engine/coding_gateway_bridge.py) refuses
  to run a live external-agent session unless Shell Executor reports its
  sandbox backend as docker — no Docker daemon exists in this environment
  (Phase 6/19), so an approved run against Claude Code or OpenCode returns
  "unsafe_backend", never a silently-skipped or faked success. See
  docs/phase-22-external-coding-agents.md Section 3.
