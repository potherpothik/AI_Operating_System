agent_capability: documentation_agent
commands:
  # docs.propose_new_doc lands as a Git Manager MR, then chains into a
  # real Documentation Engine ingest (Phase 16/18) — same read-only
  # inspection + scoped mutating branch pattern as every other
  # propose_*-capable agent.
  - pattern: "git status*"
    mode: read_only
  - pattern: "git diff*"
    mode: read_only
  - pattern: "git log*"
    mode: read_only
  - pattern: "git show*"
    mode: read_only
  - pattern: "git rev-parse*"
    mode: read_only
  - pattern: "git branch*"
    mode: read_only
  - pattern: "git checkout -b documentation-agent/*"
    mode: mutating
  - pattern: "git add *"
    mode: mutating
  - pattern: "git commit *"
    mode: mutating
  - pattern: "git push origin documentation-agent/*"
    mode: mutating
