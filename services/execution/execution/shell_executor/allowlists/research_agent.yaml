agent_capability: research_agent
commands:
  # research.propose_external_lookup lands as a Git Manager MR (a
  # proposed document describing what to look up and why — never an
  # actual fetch, this system has no external web-access tool at all)
  # — same read-only inspection + scoped mutating branch pattern as
  # every other propose_*-capable agent.
  - pattern: "git status*"
    mode: read_only
  - pattern: "git diff*"
    mode: read_only
  - pattern: "git log*"
    mode: read_only
  - pattern: "git show*"
    mode: read_only
  - pattern: "git rev-parse*"
    mode: read_only
  - pattern: "git branch*"
    mode: read_only
  - pattern: "git checkout -b research-agent/*"
    mode: mutating
  - pattern: "git add *"
    mode: mutating
  - pattern: "git commit *"
    mode: mutating
  - pattern: "git push origin research-agent/*"
    mode: mutating
