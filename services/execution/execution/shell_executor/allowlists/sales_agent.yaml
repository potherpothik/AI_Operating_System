agent_capability: sales_agent
commands:
  # sales.propose_quote/propose_order_change land as a Git Manager MR (a
  # proposed document, never a direct order mutation) — same read-only
  # inspection + scoped mutating branch pattern as the other business
  # agents. sales.explain_status's real reads (including PII-scoped
  # fields, Phase 15) go through Database Connector (db.read), not Shell
  # Executor.
  - pattern: "git status*"
    mode: read_only
  - pattern: "git diff*"
    mode: read_only
  - pattern: "git log*"
    mode: read_only
  - pattern: "git show*"
    mode: read_only
  - pattern: "git rev-parse*"
    mode: read_only
  - pattern: "git branch*"
    mode: read_only
  - pattern: "git checkout -b sales-agent/*"
    mode: mutating
  - pattern: "git add *"
    mode: mutating
  - pattern: "git commit *"
    mode: mutating
  - pattern: "git push origin sales-agent/*"
    mode: mutating
