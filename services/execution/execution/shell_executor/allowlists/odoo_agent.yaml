agent_capability: odoo_agent
commands:
  - pattern: "git status*"
    mode: read_only
  - pattern: "git diff*"
    mode: read_only
  - pattern: "git log*"
    mode: read_only
  - pattern: "git show*"
    mode: read_only
  - pattern: "git rev-parse*"
    mode: read_only
  - pattern: "git branch*"
    mode: read_only
  - pattern: "git checkout -b odoo-agent/*"
    mode: mutating
  - pattern: "git add *"
    mode: mutating
  - pattern: "git commit *"
    mode: mutating
  - pattern: "git push origin odoo-agent/*"
    mode: mutating
