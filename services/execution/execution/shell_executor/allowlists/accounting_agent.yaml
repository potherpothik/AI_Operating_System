agent_capability: accounting_agent
commands:
  # accounting.propose_entry lands as a Git Manager MR (a proposed entry
  # committed as a real reviewable document, never a direct ledger
  # write) — same read-only inspection + scoped mutating branch pattern
  # as odoo_agent/devops_agent. No non-git commands at all: this agent's
  # own real reads go through Database Connector (db.read), not Shell
  # Executor.
  - pattern: "git status*"
    mode: read_only
  - pattern: "git diff*"
    mode: read_only
  - pattern: "git log*"
    mode: read_only
  - pattern: "git show*"
    mode: read_only
  - pattern: "git rev-parse*"
    mode: read_only
  - pattern: "git branch*"
    mode: read_only
  - pattern: "git checkout -b accounting-agent/*"
    mode: mutating
  - pattern: "git add *"
    mode: mutating
  - pattern: "git commit *"
    mode: mutating
  - pattern: "git push origin accounting-agent/*"
    mode: mutating
