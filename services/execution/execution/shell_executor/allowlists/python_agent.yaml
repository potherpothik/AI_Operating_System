agent_capability: python_agent
commands:
  # python.propose_change lands as a Git Manager MR (a proposed document,
  # never a direct code change) — same read-only inspection + scoped
  # mutating branch pattern as every other propose_*-capable agent.
  - pattern: "git status*"
    mode: read_only
  - pattern: "git diff*"
    mode: read_only
  - pattern: "git log*"
    mode: read_only
  - pattern: "git show*"
    mode: read_only
  - pattern: "git rev-parse*"
    mode: read_only
  - pattern: "git branch*"
    mode: read_only
  - pattern: "git checkout -b python-agent/*"
    mode: mutating
  - pattern: "git add *"
    mode: mutating
  - pattern: "git commit *"
    mode: mutating
  - pattern: "git push origin python-agent/*"
    mode: mutating
