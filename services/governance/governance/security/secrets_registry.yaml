# Indirection only — never a real credential. Maps a target_db name to the
# environment variable Security Layer's own process reads at resolve time,
# and which capabilities are permitted to resolve it at all. A real
# deployment swaps the env-var lookup in security/secrets.py for an actual
# vault call behind this same registry shape.
demo_erp:
  connection_string_env: DEMO_ERP_DATABASE_URL
  # Phase 14: accounting_agent (accounting.read_ledger) and
  # inventory_agent (inventory.read_stock/propose_adjustment/propose_reorder)
  # both reuse database_bridge's db.read/db.dry_run/db.write tool-call
  # path unchanged (loop.py) — but that reuse is only real end-to-end if
  # Database Connector's own secrets.resolve also recognizes them as
  # allowed callers. Caught by live testing: the governance policy role
  # and the Reasoning Engine dispatch were both correct, but this
  # allow-list was the one place still hardcoded to the single agent
  # that existed when Phase 7 wrote it.
  # Phase 15: manufacturing_agent (manufacturing.flag_constraint) and
  # sales_agent (sales.explain_status) both reuse the same db.read
  # tool-call path — project_management_agent is NOT here, since it
  # reads Task Manager's own data over HTTP (task_bridge.py), never a
  # direct connection to demo_erp.
  allowed_capabilities: [database_agent, accounting_agent, inventory_agent, manufacturing_agent, sales_agent]
# Phase 29: the live Odoo XML-RPC adapter (odoo_live_bridge.py) has no
# dedicated backing microservice of its own to hold this instead, unlike
# database_agent's Database Connector — resolved directly by agents'
# own clients.resolve_secret(), same fail-closed indirection pattern.
# A single DSN-shaped URL, matching DEMO_ERP_DATABASE_URL's own
# precedent: http://username:password@host:port/database_name
live_odoo:
  connection_string_env: ODOO_CONNECTION_URL
  allowed_capabilities: [odoo_agent]
