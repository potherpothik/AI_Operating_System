# Default policy set. Version-controlled, same branch-protection as application code (Phase 1, Section 1: Security).
roles:
  odoo_agent:
    - action: "odoo.read_orm"
      resource: "*"
      effect: allow
    - action: "odoo.explain_rule"
      resource: "*"
      effect: allow
    - action: "odoo.propose_change"
      resource: "*"
      effect: require_approval
    - action: "odoo.write_orm"
      resource: "*"
      effect: deny
    - action: "odoo.execute_migration"
      resource: "*"
      effect: deny
    - action: "task.create"
      resource: "*"
      effect: allow
    - action: "task.read"
      resource: "*"
      effect: allow
    - action: "task.update_status"
      resource: "*"
      effect: allow
    # Phase 11: raw function/class bodies are confidential by default
    # (Code Analysis Engine's classifier.py) — require_approval here,
    # never allow, regardless of how low-risk the requesting agent's own
    # other actions are. The structural tier (signatures, docstrings,
    # call graph) needs no rule at all: it's classified internal and
    # freely retrievable the same way any other Phase 9 content is.
    - action: "code_analysis.raw_source_request"
      resource: "*"
      effect: require_approval
    # Phase 6: execution layer actions. All "allow" rather than
    # require_approval again here — the human approval already happened
    # once, upstream, on odoo.propose_change itself (Phase 5). Shell
    # Executor and Git Manager still enforce their own allow-lists and
    # structural branch protection; this policy layer isn't the only
    # gate, just the one that would otherwise re-prompt a human for
    # something they already approved (Phase 6 doc, Section 3 end-to-end
    # diagram shows exactly one approval step, not one per git command).
    - action: "shell.execute"
      resource: "*"
      effect: allow
    - action: "git.branch"
      resource: "*"
      effect: allow
    - action: "git.commit"
      resource: "*"
      effect: allow
    - action: "git.diff"
      resource: "*"
      effect: allow
    - action: "git.push"
      resource: "*"
      effect: allow
    - action: "git.open_mr"
      resource: "*"
      effect: allow

  database_agent:
    - action: "db.read"
      resource: "*"
      effect: allow
    - action: "db.dry_run"
      resource: "*"
      effect: allow
    # Both write paths require approval unconditionally at this layer —
    # not conditioned on the dry-run's impact estimate, which the policy
    # engine has no visibility into. "Above trivial impact" (Phase 7 doc)
    # is Database Agent's own job to judge when deciding whether to even
    # request db.propose_write; this policy layer stays maximally
    # conservative regardless, same posture as odoo.propose_change.
    # db.propose_migration in particular the doc calls out as a hard
    # rule that "cannot be granted to any capability regardless of how
    # it's declared" — never allow, ever.
    - action: "db.propose_write"
      resource: "*"
      effect: require_approval
    - action: "db.propose_migration"
      resource: "*"
      effect: require_approval
    # Connector-level execution actions — distinct from the propose_*
    # actions above, same split as Phase 6's git.push vs
    # odoo.propose_change. Allow here, because Database Connector's own
    # /db/write and /db/migrate are only ever reached after the matching
    # db.propose_write / db.propose_migration was already approved
    # upstream and Reasoning Engine's resume() is executing that
    # decision — not a second, independent request for the same action.
    - action: "db.write"
      resource: "*"
      effect: allow
    - action: "db.migrate"
      resource: "*"
      effect: allow
    - action: "db.write_direct"
      resource: "*"
      effect: deny
    - action: "db.ddl_direct"
      resource: "*"
      effect: deny
    - action: "task.create"
      resource: "*"
      effect: allow
    - action: "task.read"
      resource: "*"
      effect: allow
    - action: "task.update_status"
      resource: "*"
      effect: allow
    - action: "code_analysis.raw_source_request"
      resource: "*"
      effect: require_approval

  planner:
    - action: "planner.plan"
      resource: "*"
      effect: allow
    - action: "planner.replan"
      resource: "*"
      effect: allow
    - action: "task.create"
      resource: "*"
      effect: allow
    - action: "task.read"
      resource: "*"
      effect: allow
    - action: "task.update_status"
      resource: "*"
      effect: allow
    # Capability Registry (Phase 8) actions — planner is also the actor
    # for the registry's own startup sync from the agents service.
    # Registering a genuinely NEW capability is allow (it's just
    # reflecting an agent that's already shipped and code-reviewed);
    # CHANGING an existing capability's already-active scope, or
    # deprecating one, is the security-relevant event the Phase 8 doc
    # calls out ("routes through the same approval gate as Phase 2's
    # security-tagged config changes") — require_approval, not allow.
    - action: "capability.register_new"
      resource: "*"
      effect: allow
    - action: "capability.change_scope"
      resource: "*"
      effect: require_approval
    - action: "capability.deprecate"
      resource: "*"
      effect: require_approval

  django_agent:
    - action: "django.explain_structure"
      resource: "*"
      effect: allow
    - action: "django.propose_migration"
      resource: "*"
      effect: require_approval
    - action: "django.propose_config_change"
      resource: "*"
      effect: require_approval
    - action: "django.direct_deploy"
      resource: "*"
      effect: deny
    - action: "django.write_migration_direct"
      resource: "*"
      effect: deny
    - action: "task.create"
      resource: "*"
      effect: allow
    - action: "task.read"
      resource: "*"
      effect: allow
    - action: "task.update_status"
      resource: "*"
      effect: allow
    - action: "code_analysis.raw_source_request"
      resource: "*"
      effect: require_approval
    # django.propose_migration executes via the same migration_adapter/
    # django.py path Phase 7's Database Connector already stubbed — allow
    # here, same split as database_agent's db.migrate: the approval
    # already happened upstream on the propose_* action itself.
    - action: "db.migrate"
      resource: "*"
      effect: allow

  devops_agent:
    - action: "devops.explain_topology"
      resource: "*"
      effect: allow
    - action: "devops.propose_pipeline_change"
      resource: "*"
      effect: require_approval
    - action: "devops.propose_infra_change"
      resource: "*"
      effect: require_approval
    - action: "devops.execute_deploy"
      resource: "*"
      effect: deny
    - action: "devops.direct_infra_change"
      resource: "*"
      effect: deny
    - action: "task.create"
      resource: "*"
      effect: allow
    - action: "task.read"
      resource: "*"
      effect: allow
    - action: "task.update_status"
      resource: "*"
      effect: allow
    - action: "code_analysis.raw_source_request"
      resource: "*"
      effect: require_approval
    # Both propose_* actions land as a Git Manager MR (CI config / infra-as-code
    # files) — same execution-layer split as odoo_agent above: the human
    # approval already happened on the propose_* action itself. Git Manager's
    # branch/commit/push all route through Shell Executor internally, which
    # re-checks shell.execute for this SAME capability — omitting it here
    # denies every git.* call even though git.* itself is allowed (caught by
    # live testing, same class of gap odoo_agent's block already accounts for).
    - action: "shell.execute"
      resource: "*"
      effect: allow
    - action: "git.branch"
      resource: "*"
      effect: allow
    - action: "git.commit"
      resource: "*"
      effect: allow
    - action: "git.diff"
      resource: "*"
      effect: allow
    - action: "git.push"
      resource: "*"
      effect: allow
    - action: "git.open_mr"
      resource: "*"
      effect: allow

  docker_agent:
    # Read-only inspection via Shell Executor — Phase 6's read-only
    # bypass rule applies here: no approval needed, Shell Executor's own
    # allow-list still confines this to docker ps/logs/inspect patterns.
    - action: "docker.inspect"
      resource: "*"
      effect: allow
    - action: "docker.propose_compose_change"
      resource: "*"
      effect: require_approval
    - action: "docker.exec_into_container"
      resource: "*"
      effect: deny
    - action: "docker.stop_prod"
      resource: "*"
      effect: deny
    - action: "docker.rm"
      resource: "*"
      effect: deny
    - action: "task.create"
      resource: "*"
      effect: allow
    - action: "task.read"
      resource: "*"
      effect: allow
    - action: "task.update_status"
      resource: "*"
      effect: allow
    - action: "code_analysis.raw_source_request"
      resource: "*"
      effect: require_approval
    - action: "shell.execute"
      resource: "*"
      effect: allow
    - action: "git.branch"
      resource: "*"
      effect: allow
    - action: "git.commit"
      resource: "*"
      effect: allow
    - action: "git.diff"
      resource: "*"
      effect: allow
    - action: "git.push"
      resource: "*"
      effect: allow
    - action: "git.open_mr"
      resource: "*"
      effect: allow

  testing_agent:
    # No approval on run_suite itself — it's read-only against a sandbox
    # with no real-world mutating effect. The environment constraint is
    # enforced structurally by Security Layer's /security/verify_environment
    # before every run, not by this policy layer (Phase 10 doc, Section 5).
    - action: "testing.run_suite"
      resource: "*"
      effect: allow
    - action: "testing.propose_new_test"
      resource: "*"
      effect: require_approval
    - action: "testing.report_coverage"
      resource: "*"
      effect: allow
    - action: "testing.run_against_prod"
      resource: "*"
      effect: deny
    - action: "testing.direct_ci_change"
      resource: "*"
      effect: deny
    - action: "task.create"
      resource: "*"
      effect: allow
    - action: "task.read"
      resource: "*"
      effect: allow
    - action: "task.update_status"
      resource: "*"
      effect: allow
    - action: "code_analysis.raw_source_request"
      resource: "*"
      effect: require_approval
    - action: "shell.execute"
      resource: "*"
      effect: allow
    - action: "git.branch"
      resource: "*"
      effect: allow
    - action: "git.commit"
      resource: "*"
      effect: allow
    - action: "git.diff"
      resource: "*"
      effect: allow
    - action: "git.push"
      resource: "*"
      effect: allow
    - action: "git.open_mr"
      resource: "*"
      effect: allow

  # Phase 11: the actor for Git Manager's own best-effort auto-trigger of
  # an incremental scan after a commit lands (execution/git_manager/api.py)
  # — a system action, not an agent capability, so it gets its own minimal
  # role rather than piggybacking on human_admin's blanket allow.
  git_manager:
    - action: "code_analysis.scan"
      resource: "*"
      effect: allow

  human_admin:
    - action: "*"
      resource: "*"
      effect: allow
